<html xmlns:th="http://www.thymeleaf.org" >
	
<body>
	
	<h1>Studentu dati:</h1>
	<table border="1px">
		<tr>
			<td>Id</td>
			<td>Vārds</td>
			<td>Uzvārds</td>
		</tr>
		<th:block th:each="stud : ${package}">
		<tr>
			<td th:text="${stud.ids}" ></td>
			<td th:text="${stud.name}" ></td>
			<td th:text="${stud.surname}" ></td>
		</tr>
		</th:block>
	</table>
	

	
</body>



</html>
